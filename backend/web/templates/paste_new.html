{{template "base" .}}

{{define "title"}}New Paste - DarkCopy{{end}}

{{define "content"}}
<div class="card">
    <h2 style="margin-bottom: 1.25rem;">Buat Paste Baru</h2>

    {{if .Error}}
    <div class="alert alert-error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/new" x-data="{ visibility: 'public' }">
        <div class="form-group">
            <label for="content">Konten <span style="color: var(--accent);">*</span></label>
            <textarea id="content" name="content" placeholder="Tempel kode atau teks di sini..." required>{{.Content}}</textarea>
        </div>

        <div class="form-group">
            <label for="title">Judul (opsional)</label>
            <input type="text" id="title" name="title" placeholder="Judul paste" value="{{.Title}}">
        </div>

        <div class="form-group">
            <label for="language">Bahasa</label>
            <select id="language" name="language">
                {{range .Languages}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
        </div>

        <div class="form-group">
            <label for="expires_in">Waktu Kadaluarsa</label>
            <select id="expires_in" name="expires_in">
                {{range .ExpiryOptions}}
                <option value="{{.Duration.Minutes}}">{{.Label}}</option>
                {{end}}
            </select>
        </div>

        <div class="form-group">
            <label>Visibilitas</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="visibility" value="public" x-model="visibility" checked>
                    Publik
                </label>
                <label>
                    <input type="radio" name="visibility" value="unlisted" x-model="visibility">
                    Unlisted
                </label>
                <label>
                    <input type="radio" name="visibility" value="password_protected" x-model="visibility">
                    Dilindungi Password
                </label>
            </div>
        </div>

        <div class="form-group" x-show="visibility === 'password_protected'" x-transition>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Masukkan password">
        </div>

        <button type="submit" class="btn btn-primary">Buat Paste</button>
    </form>
</div>
{{end}}
